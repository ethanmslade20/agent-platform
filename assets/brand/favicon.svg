<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="BookPilot">
  <title>BookPilot</title>
  <defs>
    <linearGradient id="bpFav" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#2474FF"/>
      <stop offset="1" stop-color="#1455F5"/>
